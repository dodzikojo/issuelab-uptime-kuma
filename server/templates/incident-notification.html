<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>{{ title }}</h2>
    <p>
        <span style="display: inline-block; padding: 2px 8px; border-radius: 4px; background-color: {% if severity == 'critical' %}#dc3545{% elsif severity == 'major' %}#ffc107{% else %}#17a2b8{% endif %}; color: {% if severity == 'major' %}#000{% else %}#fff{% endif %}; font-size: 0.85em; font-weight: bold;">
            {{ severity | capitalize }}
        </span>
        <span style="display: inline-block; padding: 2px 8px; border-radius: 4px; background-color: #6c757d; color: #fff; font-size: 0.85em; margin-left: 4px;">
            {{ status | capitalize }}
        </span>
    </p>
    <div style="padding: 15px; background-color: #f8f9fa; border-radius: 6px; margin: 15px 0;">
        {{ content }}
    </div>
    <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
    <p style="color: #999; font-size: 0.8em;">
        <a href="{{ unsubscribeUrl }}" style="color: #999;">Unsubscribe</a> from these notifications.
    </p>
</body>
</html>
