<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>Update: {{ title }}</h2>
    <p>
        Status changed to:
        <span style="display: inline-block; padding: 2px 8px; border-radius: 4px; background-color: {% if status == 'resolved' %}#28a745{% elsif status == 'monitoring' %}#007bff{% elsif status == 'identified' %}#17a2b8{% else %}#ffc107{% endif %}; color: {% if status == 'investigating' %}#000{% else %}#fff{% endif %}; font-weight: bold;">
            {{ status | capitalize }}
        </span>
    </p>
    <div style="padding: 15px; background-color: #f8f9fa; border-radius: 6px; margin: 15px 0;">
        {{ updateContent }}
    </div>
    <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
    <p style="color: #999; font-size: 0.8em;">
        <a href="{{ unsubscribeUrl }}" style="color: #999;">Unsubscribe</a> from these notifications.
    </p>
</body>
</html>
